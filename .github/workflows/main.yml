name: Build iOS IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
      
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Disable code signing completely
        run: |
          # Отключаем подпись для всех конфигураций
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = NO;/CODE_SIGNING_ALLOWED = YES;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Добавляем в xcconfig файлы
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM = " >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = " >> ios/Flutter/Release.xcconfig
          
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Debug.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Debug.xcconfig
          echo "DEVELOPMENT_TEAM = " >> ios/Flutter/Debug.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = " >> ios/Flutter/Debug.xcconfig
      
      - name: Build with xcodebuild directly
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build
          cd ..
      
      - name: Create IPA from .app
        run: |
          mkdir -p Payload
          cp -R ios/build/Release-iphoneos/Runner.app Payload/
          zip -r app.ipa Payload/
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-for-trollstore
          path: app.ipa
